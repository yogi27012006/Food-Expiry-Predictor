openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Food Freshness Analyzer API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: food
    description: Food item operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /food/analyze:
    post:
      operationId: analyzeFood
      tags: [food]
      summary: Analyze food image
      description: Upload a food image and get an AI-predicted expiry date based on color, texture, and visual freshness indicators
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: Food image file
                foodName:
                  type: string
                  description: Optional name of the food item
              required:
                - image
      responses:
        "201":
          description: Analysis complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodItem"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /food/items:
    get:
      operationId: listFoodItems
      tags: [food]
      summary: List all food items
      description: Returns all tracked food items with their expiry predictions
      responses:
        "200":
          description: List of food items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoodItem"

  /food/items/{id}:
    delete:
      operationId: deleteFoodItem
      tags: [food]
      summary: Delete a food item
      description: Remove a food item from tracking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted successfully
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    FoodItem:
      type: object
      properties:
        id:
          type: integer
        foodName:
          type: string
        imageUrl:
          type: ["string", "null"]
        freshnessScore:
          type: integer
          description: Freshness score from 0 to 100
        freshnessLabel:
          type: string
          description: "Fresh, Good, Fair, or Spoiled"
        predictedExpiryDate:
          type: string
          format: date
          description: ISO date string of predicted expiry
        aiAnalysis:
          type: string
          description: Detailed AI analysis of color, texture, and freshness
        daysUntilExpiry:
          type: integer
          description: Days remaining until predicted expiry
        notified:
          type: boolean
          description: Whether the user has been notified about this item
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - foodName
        - freshnessScore
        - freshnessLabel
        - predictedExpiryDate
        - aiAnalysis
        - daysUntilExpiry
        - notified
        - createdAt

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
